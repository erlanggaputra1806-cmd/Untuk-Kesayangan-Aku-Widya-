<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Widya ❤️</title>
<style>
body{margin:0;padding:20px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;font-family:Arial}
.box{max-width:400px;width:100%}
img{width:280px;height:280px;object-fit:cover;border-radius:20px;border:5px solid #fff;box-shadow:0 15px 40px rgba(0,0,0,0.3);margin-bottom:25px}
h2{color:#fff;font-size:24px;margin:15px 0;text-shadow:0 2px 10px rgba(0,0,0,0.3)}
p{color:#ffeaa7;font-size:14px;margin-bottom:30px}
.btn{display:inline-block;padding:15px 30px;background:#fff;color:#667eea;font-size:20px;font-weight:bold;letter-spacing:2px;border-radius:15px;text-decoration:none;transition:0.3s}
.btn:active{transform:scale(0.95);background:#ffeaa7}
</style>
</head>
<body>
<div class="box">
<img src="foto.jpg" alt="Foto Kita">
<h2>Maafkan aku yang tidak sempurna</h2>
<p>Klik namanya di bawah ya sayang...</p>
<a href="layer2.html" class="btn">UNTUK WIDYA ZAHRA UTAMI</a>
</div>
</body>
</html>
